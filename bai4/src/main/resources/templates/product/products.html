<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f14; --surface: #141720; --surface2: #1c2030;
            --border: #252a38; --border2: #2e3447;
            --text: #e2e8f0; --muted: #64748b; --subtle: #94a3b8;
            --accent: #6366f1; --accent2: #818cf8; --accent-bg: rgba(99,102,241,0.12);
            --green: #22d3a5; --red: #f87171; --red-bg: rgba(248,113,113,0.10);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
        .main-nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 58px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; }
        .nav-left { display: flex; align-items: center; gap: 2rem; }
        .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .brand-gem { width: 30px; height: 30px; background: linear-gradient(135deg, #6366f1, #a78bfa); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; box-shadow: 0 0 14px rgba(99,102,241,0.4); }
        .brand-name { font-weight: 700; font-size: 1rem; color: var(--text); }
        .nav-links { display: flex; align-items: center; gap: 2px; }
        .nav-links a { text-decoration: none; color: var(--muted); font-size: 0.82rem; font-weight: 500; padding: 5px 13px; border-radius: 7px; transition: all 0.15s; }
        .nav-links a:hover { color: var(--text); background: var(--surface2); }
        .nav-search { display: flex; align-items: center; gap: 8px; }
        .nav-search input { background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; padding: 7px 14px; font-size: 0.82rem; color: var(--text); width: 200px; outline: none; font-family: inherit; }
        .nav-search input::placeholder { color: var(--muted); }
        .nav-search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
        .nav-search button { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 7px 16px; font-size: 0.82rem; font-weight: 500; font-family: inherit; cursor: pointer; }
        .nav-search button:hover { background: var(--accent2); }
        .body-content { max-width: 1080px; margin: 0 auto; padding: 2.5rem 1.5rem; width: 100%; flex: 1; }
        .main-footer { background: var(--surface); border-top: 1px solid var(--border); text-align: center; padding: 1.1rem; font-size: 0.76rem; color: var(--muted); }
        .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; }
        .page-title { font-size: 1.65rem; font-weight: 700; color: var(--text); letter-spacing: -0.03em; }
        .page-subtitle { font-size: 0.82rem; color: var(--muted); margin-top: 5px; }
        .btn-dk { display: inline-flex; align-items: center; gap: 6px; font-size: 0.82rem; font-weight: 500; border-radius: 8px; padding: 8px 16px; cursor: pointer; text-decoration: none; transition: all 0.15s; border: none; white-space: nowrap; font-family: inherit; }
        .btn-accent { background: var(--accent); color: #fff; box-shadow: 0 2px 10px rgba(99,102,241,0.25); }
        .btn-accent:hover { background: var(--accent2); color: #fff; transform: translateY(-1px); }
        .btn-ghost { background: var(--surface2); color: var(--subtle); border: 1px solid var(--border2); }
        .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
        .btn-red { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,113,113,0.20); }
        .btn-red:hover { background: var(--red); color: #fff; }
        .dk-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table thead tr { border-bottom: 1px solid var(--border2); }
        .data-table thead th { padding: 13px 16px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); text-align: left; }
        .data-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
        .data-table tbody tr:last-child { border-bottom: none; }
        .data-table tbody tr:hover { background: var(--surface2); }
        .data-table td { padding: 13px 16px; vertical-align: middle; }
        .badge-cat { background: var(--accent-bg); color: var(--accent2); border: 1px solid rgba(99,102,241,0.2); border-radius: 20px; padding: 3px 11px; font-size: 0.74rem; font-weight: 600; }
        .id-badge { background: var(--surface2); border: 1px solid var(--border2); color: var(--muted); border-radius: 6px; padding: 3px 9px; font-size: 0.74rem; font-weight: 700; }
        .prod-img { width: 76px; height: 56px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border2); display: block; }
        .price-text { font-weight: 600; color: var(--green); font-size: 0.87rem; }
        .empty-state { text-align: center; padding: 4rem 1rem; color: var(--muted); }
        .empty-icon { font-size: 2.8rem; margin-bottom: 1rem; opacity: 0.2; display: block; }
        .empty-state p { font-size: 0.88rem; line-height: 1.8; }
        .empty-state a { color: var(--accent2); text-decoration: none; font-weight: 600; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
        .anim { animation: fadeUp 0.3s ease both; }
        .anim-1 { animation-delay: 0.06s; }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 6px; }
    </style>
</head>
<body>

<nav class="main-nav">
    <div class="nav-left">
        <a class="nav-brand" th:href="@{/products}">
            <div class="brand-gem">◈</div>
            <span class="brand-name">ProductHub</span>
        </a>
        <div class="nav-links">
            <a th:href="@{/products}">Trang chủ</a>
            <a th:href="@{/products/create}">Sản phẩm</a>
        </div>
    </div>
    <form class="nav-search" th:action="@{/home/search}" th:method="get">
        <input type="search" name="q" placeholder="Tìm kiếm...">
        <button type="submit">Tìm</button>
    </form>
</nav>

<div class="body-content">

    <div class="page-header anim">
        <div>
            <h1 class="page-title">Sản phẩm</h1>
            <p class="page-subtitle">Quản lý toàn bộ danh mục sản phẩm</p>
        </div>
        <a th:href="@{/products/create}" class="btn-dk btn-accent">＋ Thêm sản phẩm</a>
    </div>

    <div class="dk-card anim anim-1">
        <table class="data-table">
            <thead>
            <tr>
                <th>#</th>
                <th>Tên sản phẩm</th>
                <th>Giá</th>
                <th>Hình ảnh</th>
                <th>Danh mục</th>
                <th style="text-align:right; padding-right:20px;">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(listproduct)}">
                <td colspan="6">
                    <div class="empty-state">
                        <span class="empty-icon">📦</span>
                        <p>Chưa có sản phẩm nào.<br>
                            <a th:href="@{/products/create}">Thêm sản phẩm đầu tiên →</a>
                        </p>
                    </div>
                </td>
            </tr>
            <tr th:each="product : ${listproduct}">
                <td><span class="id-badge" th:text="${product.id}"></span></td>
                <td><span style="font-weight:500;" th:text="${product.name}"></span></td>
                <td>
                        <span class="price-text"
                              th:text="${#numbers.formatInteger(product.price, 0, 'COMMA') + ' ₫'}"></span>
                </td>
                <td>
                    <img class="prod-img"
                         th:if="${product.image != null and !#strings.isEmpty(product.image)}"
                         th:src="@{/images/} + ${product.image}" alt="img">
                    <span style="color:var(--muted); font-size:0.78rem;"
                          th:unless="${product.image != null and !#strings.isEmpty(product.image)}">—</span>
                </td>
                <td>
                        <span class="badge-cat"
                              th:text="${product.category?.name ?: 'Chưa phân loại'}"></span>
                </td>
                <td>
                    <div style="display:flex; gap:8px; justify-content:flex-end;">
                        <a th:href="@{/products/edit/{id}(id=${product.id})}"
                           class="btn-dk btn-ghost">✏ Sửa</a>
                        <a th:href="@{/products/delete/{id}(id=${product.id})}"
                           class="btn-dk btn-red"
                           onclick="return confirm('Xoá sản phẩm này?')">🗑 Xoá</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${!#lists.isEmpty(listproduct)}"
         style="margin-top:0.9rem; font-size:0.76rem; color:var(--muted); text-align:right;">
        Tổng: <strong style="color:var(--subtle);" th:text="${#lists.size(listproduct)}"></strong> sản phẩm
    </div>

</div>

<footer class="main-footer">© 2025 · Phát triển ứng dụng với J2EE</footer>
</body>
</html>
