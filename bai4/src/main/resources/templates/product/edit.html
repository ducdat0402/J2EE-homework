<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chỉnh sửa sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f14; --surface: #141720; --surface2: #1c2030;
            --border: #252a38; --border2: #2e3447;
            --text: #e2e8f0; --muted: #64748b; --subtle: #94a3b8;
            --accent: #6366f1; --accent2: #818cf8; --accent-bg: rgba(99,102,241,0.12);
            --green: #22d3a5; --green-bg: rgba(34,211,165,0.10);
            --red: #f87171; --yellow: #fbbf24; --yellow-bg: rgba(251,191,36,0.10);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
        .main-nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 58px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; }
        .nav-left { display: flex; align-items: center; gap: 2rem; }
        .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .brand-gem { width: 30px; height: 30px; background: linear-gradient(135deg, #6366f1, #a78bfa); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; box-shadow: 0 0 14px rgba(99,102,241,0.4); }
        .brand-name { font-weight: 700; font-size: 1rem; color: var(--text); }
        .nav-links { display: flex; align-items: center; gap: 2px; }
        .nav-links a { text-decoration: none; color: var(--muted); font-size: 0.82rem; font-weight: 500; padding: 5px 13px; border-radius: 7px; transition: all 0.15s; }
        .nav-links a:hover { color: var(--text); background: var(--surface2); }
        .nav-search { display: flex; align-items: center; gap: 8px; }
        .nav-search input { background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; padding: 7px 14px; font-size: 0.82rem; color: var(--text); width: 200px; outline: none; font-family: inherit; }
        .nav-search input::placeholder { color: var(--muted); }
        .nav-search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
        .nav-search button { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 7px 16px; font-size: 0.82rem; font-weight: 500; font-family: inherit; cursor: pointer; }
        .nav-search button:hover { background: var(--accent2); }
        .body-content { max-width: 1080px; margin: 0 auto; padding: 2.5rem 1.5rem; width: 100%; flex: 1; }
        .main-footer { background: var(--surface); border-top: 1px solid var(--border); text-align: center; padding: 1.1rem; font-size: 0.76rem; color: var(--muted); }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 0.82rem; font-weight: 500; text-decoration: none; margin-bottom: 1.5rem; transition: color 0.15s; }
        .back-link:hover { color: var(--text); }
        .page-title { font-size: 1.65rem; font-weight: 700; color: var(--text); letter-spacing: -0.03em; }
        .page-subtitle { font-size: 0.82rem; color: var(--muted); margin-top: 5px; margin-bottom: 1.5rem; }
        .btn-dk { display: inline-flex; align-items: center; gap: 6px; font-size: 0.82rem; font-weight: 500; border-radius: 8px; padding: 8px 16px; cursor: pointer; text-decoration: none; transition: all 0.15s; border: none; white-space: nowrap; font-family: inherit; }
        .btn-ghost { background: var(--surface2); color: var(--subtle); border: 1px solid var(--border2); }
        .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
        .btn-green { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,211,165,0.25); }
        .btn-green:hover { background: var(--green); color: #0d0f14; transform: translateY(-1px); }
        .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; max-width: 540px; }
        .form-card-header { padding: 1.1rem 1.6rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
        .form-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); flex-shrink: 0; }
        .form-card-header-label { font-size: 0.76rem; font-weight: 600; color: var(--subtle); text-transform: uppercase; letter-spacing: 0.07em; }
        .form-card-body { padding: 1.6rem; display: flex; flex-direction: column; gap: 1.2rem; }
        .field-label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--subtle); margin-bottom: 7px; }
        .field-req { color: var(--red); margin-left: 2px; }
        .field-input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; padding: 9px 13px; font-size: 0.87rem; font-family: inherit; color: var(--text); outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
        .field-input::placeholder { color: var(--muted); }
        .field-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.14); }
        .prefix-wrap { position: relative; }
        .prefix-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.82rem; font-weight: 600; pointer-events: none; }
        .prefix-wrap .field-input { padding-left: 30px; }
        .field-input[type="file"] { padding: 8px 12px; cursor: pointer; }
        .field-input[type="file"]::-webkit-file-upload-button { background: var(--accent-bg); color: var(--accent2); border: 1px solid rgba(99,102,241,0.3); border-radius: 6px; padding: 4px 12px; font-size: 0.78rem; font-weight: 600; cursor: pointer; margin-right: 10px; font-family: inherit; }
        select.field-input { cursor: pointer; }
        select.field-input option { background: var(--surface2); color: var(--text); }
        .field-error { margin-top: 6px; background: var(--yellow-bg); border: 1px solid rgba(251,191,36,0.25); color: var(--yellow); border-radius: 7px; padding: 7px 11px; font-size: 0.78rem; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .field-error::before { content: "⚠ "; }
        .field-hint { font-size: 0.74rem; color: var(--muted); margin-top: 5px; }
        .form-actions { border-top: 1px solid var(--border); padding-top: 1rem; display: flex; gap: 10px; align-items: center; }
        .img-preview { display: flex; align-items: center; gap: 14px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: 12px 16px; max-width: 540px; margin-bottom: 1.5rem; }
        .img-preview img { width: 68px; height: 52px; object-fit: cover; border-radius: 7px; border: 1px solid var(--border2); }
        .ip-label { font-size: 0.72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
        .ip-name { font-size: 0.84rem; color: var(--subtle); margin-top: 2px; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
        .anim { animation: fadeUp 0.3s ease both; }
        .anim-1 { animation-delay: 0.06s; }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 6px; }
    </style>
</head>
<body>

<nav class="main-nav">
    <div class="nav-left">
        <a class="nav-brand" th:href="@{/products}">
            <div class="brand-gem">◈</div>
            <span class="brand-name">ProductHub</span>
        </a>
        <div class="nav-links">
            <a th:href="@{/products}">Trang chủ</a>
            <a th:href="@{/products/create}">Sản phẩm</a>
        </div>
    </div>
    <form class="nav-search" th:action="@{/home/search}" th:method="get">
        <input type="search" name="q" placeholder="Tìm kiếm...">
        <button type="submit">Tìm</button>
    </form>
</nav>

<div class="body-content">

    <a th:href="@{/products}" class="back-link">← Quay lại danh sách</a>

    <h1 class="page-title anim">Chỉnh sửa sản phẩm</h1>
    <p class="page-subtitle anim">
        Cập nhật thông tin sản phẩm
        <span style="color:var(--accent2); font-weight:600;" th:text="'#' + ${product.id}"></span>
    </p>

    <!-- Ảnh hiện tại -->
    <div class="img-preview anim"
         th:if="${product.image != null and !#strings.isEmpty(product.image)}">
        <img th:src="@{/images/} + ${product.image}" alt="current">
        <div>
            <p class="ip-label">Ảnh hiện tại</p>
            <p class="ip-name" th:text="${product.image}"></p>
        </div>
    </div>

    <div class="form-card anim anim-1">
        <div class="form-card-header">
            <div class="form-dot"></div>
            <span class="form-card-header-label">Cập nhật thông tin</span>
        </div>
        <form th:action="@{/products/edit}" th:object="${product}"
              method="post" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{image}">
            <div class="form-card-body">

                <div>
                    <label for="name" class="field-label">Tên sản phẩm <span class="field-req">*</span></label>
                    <input class="field-input" type="text" th:field="*{name}" id="name" placeholder="Nhập tên sản phẩm...">
                    <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div>
                    <label for="price" class="field-label">Giá <span class="field-req">*</span></label>
                    <div class="prefix-wrap">
                        <span class="prefix-icon">₫</span>
                        <input class="field-input" type="number" th:field="*{price}" id="price" placeholder="0">
                    </div>
                    <div class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                </div>

                <div>
                    <label for="imageEdit" class="field-label">
                        Thay ảnh mới <span style="font-weight:400; color:var(--muted);">(tuỳ chọn)</span>
                    </label>
                    <input class="field-input" type="file" id="imageEdit" name="imageProduct" accept="image/png,image/jpeg,image/jpg">
                    <p class="field-hint">Để trống nếu không muốn thay ảnh</p>
                </div>

                <div>
                    <label for="category" class="field-label">Danh mục</label>
                    <select th:field="*{category.id}" class="field-input" id="category">
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-dk btn-green">✓ Lưu thay đổi</button>
                    <a th:href="@{/products}" class="btn-dk btn-ghost">Huỷ</a>
                </div>

            </div>
        </form>
    </div>

</div>

<footer class="main-footer">© 2025 · Phát triển ứng dụng với J2EE</footer>
</body>
</html>
