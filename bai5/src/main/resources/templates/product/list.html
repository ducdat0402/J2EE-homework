<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar bg-dark border-bottom" data-bs-theme="dark">
    <div class="container-fluid" style="padding-left:40px">
        <a class="navbar-brand" th:href="@{/products}">Home</a>
        <a class="navbar-brand" th:href="@{/products/add}">Products</a>
    </div>
</nav>

<div class="container mt-4">
    <a th:href="@{/products/add}" class="btn btn-primary mb-3">Create New Product</a>
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Name</th>
            <th>Image</th>
            <th>Price</th>
            <th>Category Name</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <th scope="row" th:text="${product.id}"></th>
            <td th:text="${product.name}"></td>
            <td>
                <img height="120" width="150"
                     th:if="${product.image != null and !#strings.isEmpty(product.image)}"
                     th:src="@{/images/} + ${product.image}" alt="img">
            </td>
            <td th:text="${product.price}"></td>
            <td th:text="${product.category != null ? product.category.name : ''}"></td>
            <td>
                <a th:href="@{/products/edit/{id}(id=${product.id})}"
                   class="btn btn-secondary btn-sm">Edit</a>
                <form th:action="@{/products/delete/{id}(id=${product.id})}"
                      method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger btn-sm"
                            onclick="return confirm('Xoá sản phẩm này?')">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div class="text-center mt-4 text-muted">
    <p>© 2025 - Phát triển ứng dụng với J2EE</p>
</div>
</body>
</html>
