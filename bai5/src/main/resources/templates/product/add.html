<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar bg-dark border-bottom" data-bs-theme="dark">
    <div class="container-fluid" style="padding-left:40px">
        <a class="navbar-brand" th:href="@{/products}">Home</a>
        <a class="navbar-brand" th:href="@{/products/add}">Products</a>
    </div>
</nav>

<div class="container mt-4" style="max-width:600px">
    <h4 class="mb-3">Add Product</h4>
    <form th:action="@{/products/save}" th:object="${product}"
          method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input class="form-control" type="text" th:field="*{name}" placeholder="Product Name">
            <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Image URL</label>
            <input class="form-control" type="file" name="imageFile" accept="image/*">
        </div>
        <div class="mb-3">
            <label class="form-label">Price</label>
            <input class="form-control" type="number" th:field="*{price}" placeholder="Price">
            <div class="text-danger small" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Category</label>
            <select th:field="*{category}" class="form-control">
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Add Product</button>
        <a th:href="@{/products}" class="btn btn-secondary ms-2">Huỷ</a>
    </form>
</div>
</body>
</html>
