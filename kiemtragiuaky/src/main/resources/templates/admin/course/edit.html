<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sửa học phần — EduPortal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--blue-400:#60a5fa;--blue-500:#3b82f6;--blue-600:#2563eb;--blue-700:#1d4ed8;--blue-800:#1e40af;--navy:#0f172a;--navy2:#1e293b;--navy3:#334155;--muted:#94a3b8;--border:#1e3a5f;--text:#e2e8f0;--text2:#cbd5e1;--white:#fff;--danger:#ef4444;--success:#10b981}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
        .navbar{background:rgba(15,23,42,0.97);border-bottom:1px solid var(--border);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
        .nav-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--blue-500),var(--blue-800));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
        .nav-title{font-weight:800;font-size:1rem;color:var(--white)}
        .btn{display:inline-flex;align-items:center;gap:6px;font-size:0.82rem;font-weight:600;border-radius:8px;padding:7px 16px;cursor:pointer;text-decoration:none;transition:all 0.15s;border:none;font-family:inherit}
        .btn-logout{background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.2)}
        .btn-logout:hover{background:var(--danger);color:#fff}
        .btn-sm{padding:5px 12px;font-size:0.78rem}
        .main{max-width:1000px;margin:0 auto;padding:2.5rem 1.5rem;width:100%;flex:1}
        .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:0.83rem;font-weight:500;text-decoration:none;margin-bottom:1.5rem;transition:color 0.15s}
        .back-link:hover{color:var(--blue-400)}
        .page-title{font-size:1.6rem;font-weight:800;color:var(--white);letter-spacing:-0.03em}
        .page-sub{font-size:0.83rem;color:var(--muted);margin-top:4px;margin-bottom:1.8rem}
        .form-card{background:var(--navy2);border:1px solid var(--border);border-radius:16px;overflow:hidden;max-width:580px;box-shadow:0 4px 24px rgba(0,0,0,0.3)}
        .form-card-header{padding:1.1rem 1.8rem;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(37,99,235,0.1),transparent);display:flex;align-items:center;gap:10px}
        .header-dot{width:8px;height:8px;border-radius:50%;background:var(--blue-500);box-shadow:0 0 8px var(--blue-500)}
        .header-label{font-size:0.78rem;font-weight:700;color:var(--blue-400);text-transform:uppercase;letter-spacing:0.08em}
        .form-card-body{padding:1.8rem;display:flex;flex-direction:column;gap:1.2rem}
        .field label{display:block;font-size:0.82rem;font-weight:600;color:var(--text2);margin-bottom:7px}
        .field-req{color:var(--danger);margin-left:2px}
        .field input,.field select{width:100%;background:var(--navy);border:1.5px solid var(--border);border-radius:9px;padding:10px 14px;font-size:0.88rem;font-family:inherit;color:var(--text);outline:none;transition:all 0.15s}
        .field input::placeholder{color:var(--muted)}
        .field input:focus,.field select:focus{border-color:var(--blue-500);box-shadow:0 0 0 3px rgba(59,130,246,0.15)}
        .field select{cursor:pointer}
        .field select option{background:var(--navy2);color:var(--text)}
        .field input[type="file"]{padding:8px 12px;cursor:pointer}
        .field input[type="file"]::-webkit-file-upload-button{background:rgba(59,130,246,0.15);color:var(--blue-400);border:1px solid rgba(59,130,246,0.3);border-radius:6px;padding:4px 12px;font-size:0.78rem;font-weight:600;cursor:pointer;margin-right:10px;font-family:inherit}
        .field-error{margin-top:6px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;border-radius:8px;padding:6px 11px;font-size:0.78rem;display:flex;align-items:center;gap:6px}
        .field-error::before{content:"⚠ "}
        .field-hint{font-size:0.76rem;color:var(--muted);margin-top:5px}
        .form-actions{border-top:1px solid var(--border);padding-top:1.2rem;display:flex;gap:10px;align-items:center}
        .btn-save{background:var(--blue-600);color:#fff;border:none;border-radius:9px;padding:10px 24px;font-size:0.88rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 10px rgba(37,99,235,0.3)}
        .btn-save:hover{background:var(--blue-700);transform:translateY(-1px)}
        .btn-cancel{background:var(--navy2);color:var(--muted);border:1px solid var(--border);border-radius:9px;padding:10px 20px;font-size:0.88rem;font-weight:500;font-family:inherit;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;transition:all 0.15s}
        .btn-cancel:hover{color:var(--text);border-color:var(--blue-500)}
        .img-preview{display:flex;align-items:center;gap:14px;background:rgba(37,99,235,0.06);border:1px solid rgba(59,130,246,0.15);border-radius:10px;padding:12px 16px;margin-bottom:0.5rem}
        .img-preview img{width:70px;height:52px;object-fit:cover;border-radius:7px;border:1px solid var(--border)}
        .img-preview .ip-label{font-size:0.73rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
        .img-preview .ip-name{font-size:0.83rem;color:var(--text2);margin-top:2px}
        footer{background:var(--navy2);border-top:1px solid var(--border);text-align:center;padding:1.2rem;font-size:0.78rem;color:var(--muted)}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .anim{animation:fadeUp 0.35s ease both}
        .anim-1{animation-delay:0.07s}
        @media(max-width:768px){.navbar{padding:0 1rem}.main{padding:1.5rem 1rem}.form-card{max-width:100%}}
    </style>
</head>
<body>

<nav class="navbar">
    <a class="nav-brand" th:href="@{/home}">
        <div class="nav-logo">🎓</div>
        <span class="nav-title">EduPortal</span>
    </a>
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-logout btn-sm">🚪 Logout</button>
    </form>
</nav>

<div class="main">
    <a th:href="@{/admin/courses}" class="back-link">← Quay lại danh sách</a>

    <div class="page-title anim">
        ✏ Sửa học phần
        <span style="color:var(--blue-400);font-size:1rem;font-weight:600;"
              th:text="'#' + ${course.id}"></span>
    </div>
    <div class="page-sub anim">Cập nhật thông tin học phần</div>

    <!-- Image preview -->
    <div class="img-preview anim"
         th:if="${course.image != null and !#strings.isEmpty(course.image)}"
         style="max-width:580px;margin-bottom:1.2rem;">
        <img th:src="@{/images/} + ${course.image}" alt="current">
        <div>
            <p class="ip-label">Ảnh hiện tại</p>
            <p class="ip-name" th:text="${course.image}"></p>
        </div>
    </div>

    <div class="form-card anim anim-1">
        <div class="form-card-header">
            <div class="header-dot"></div>
            <span class="header-label">Cập nhật thông tin</span>
        </div>
        <form th:action="@{/admin/courses/update}" th:object="${course}"
              method="post" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{image}">

            <div class="form-card-body">

                <div class="field">
                    <label>Tên học phần <span class="field-req">*</span></label>
                    <input type="text" th:field="*{name}" placeholder="Nhập tên học phần...">
                    <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="field">
                    <label>Số tín chỉ <span class="field-req">*</span></label>
                    <input type="number" th:field="*{credits}">
                </div>

                <div class="field">
                    <label>Giảng viên <span class="field-req">*</span></label>
                    <input type="text" th:field="*{lecturer}">
                </div>

                <div class="field">
                    <label>Thay ảnh mới
                        <span style="font-weight:400;color:var(--muted);">(tuỳ chọn)</span>
                    </label>
                    <input type="file" name="imageFile" accept="image/*">
                    <p class="field-hint">Để trống nếu không muốn thay ảnh</p>
                </div>

                <div class="field">
                    <label>Danh mục</label>
                    <select th:field="*{category.id}">
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"></option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-save">✓ Lưu thay đổi</button>
                    <a th:href="@{/admin/courses}" class="btn-cancel">Huỷ</a>
                </div>

            </div>
        </form>
    </div>
</div>

<footer>© 2025 · EduPortal Admin Panel</footer>
</body>
</html>
